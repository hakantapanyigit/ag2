name: docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  merge_group:
    types: [checks_requested]

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
          
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          
      - name: pydoc-markdown install
        run: |
          python -m pip install --upgrade pip
          pip install pydoc-markdown pyyaml termcolor
          pip install databind.core==4.4.2 databind.json==4.4.2
          
      - name: pydoc-markdown run
        run: |
          pydoc-markdown
          
      - name: quarto install
        working-directory: ${{ runner.temp }}
        run: |
          wget -q https://github.com/quarto-dev/quarto-cli/releases/download/v1.5.23/quarto-1.5.23-linux-amd64.tar.gz
          tar -xzf quarto-1.5.23-linux-amd64.tar.gz
          echo "$(pwd)/quarto-1.5.23/bin/" >> $GITHUB_PATH
          
      - name: Process notebooks
        run: |
          python process_notebooks.py render
          
      - name: Build
        run: |
          if [ -e yarn.lock ]; then
            yarn install --frozen-lockfile --ignore-engines
            yarn build
          elif [ -e package-lock.json ]; then
            npm ci
            npm run build
          else
            npm i --legacy-peer-deps
            npm run build
          fi

      - name: Deploy to docs branch
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # Create and switch to a new docs branch if it doesn't exist
          git checkout -B docs
          
          # Copy all files to docs branch
          cp -r . /tmp/website-content
          git clean -fdx
          cp -r /tmp/website-content/* .
          
          # Commit and push changes
          git add .
          git commit -m "Update documentation"
          git push -f origin docs
