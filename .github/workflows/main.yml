name: docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  merge_group:
    types: [checks_requested]

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
          
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Deploy to docs branch
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # Create and switch to a new docs branch if it doesn't exist
          git checkout -B docs
          
          # Remove everything except .git directory
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          
          # Copy only website/docs content
          mkdir -p docs
          cp -r website/docs/* docs/
          
          # Force add docs directory
          git add -f docs
          
          # Commit with --allow-empty in case there are no changes
          git commit -m "Update documentation" --allow-empty
          
          # Force push to docs branch
          git push -f origin docs
