name: docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  merge_group:
    types: [checks_requested]

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
          
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          
      - name: pydoc-markdown install
        run: |
          python -m pip install --upgrade pip
          pip install pydoc-markdown pyyaml termcolor
          pip install databind.core==4.4.2 databind.json==4.4.2
          
      - name: pydoc-markdown run
        run: |
          pydoc-markdown
          
      - name: quarto install
        working-directory: ${{ runner.temp }}
        run: |
          wget -q https://github.com/quarto-dev/quarto-cli/releases/download/v1.5.23/quarto-1.5.23-linux-amd64.tar.gz
          tar -xzf quarto-1.5.23-linux-amd64.tar.gz
          echo "$(pwd)/quarto-1.5.23/bin/" >> $GITHUB_PATH
          
      - name: Process notebooks
        run: |
          python process_notebooks.py render

      - name: Deploy to docs branch
        working-directory: .
        run: |
          # Store docs content in a temporary location
          mkdir -p /tmp/docs-content
          cp -r * /tmp/docs-content/
          
          # Configure git
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # Create and switch to a new docs branch if it doesn't exist
          git checkout -B docs
          
          # Remove everything
          git rm -rf .
          
          # Copy the saved docs content directly to root
          cp -r /tmp/docs-content/* .
          
          # Add all files
          git add .
          
          # Commit with --allow-empty in case there are no changes
          git commit -m "Update documentation" --allow-empty
          
          # Force push to docs branch
          git push -f origin docs
